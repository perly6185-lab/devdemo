<!--
  Contact page mockup for DevAgent Demo (Issue #24).
  Design artifact only — self-contained, inline CSS, no scripts, no external resources.
  Static preview: the form does not submit; error/success states are documented in BRIEF.md.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — DevAgent Demo</title>
</head>
<body style="margin:0; background:#f5f7fa; color:#1f2933;
             font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
             line-height:1.5;">

  <!-- SiteHeader -->
  <header style="background:#ffffff; border-bottom:1px solid #e4e7eb;">
    <div style="max-width:960px; margin:0 auto; padding:16px 24px;
                display:flex; align-items:center; justify-content:space-between;">
      <span style="font-weight:700; font-size:18px; letter-spacing:-0.2px;">DevAgent Demo</span>
      <nav>
        <a href="#" style="color:#616e7c; text-decoration:none; margin-left:20px; font-size:15px;">Home</a>
        <a href="#" style="color:#4f46e5; text-decoration:none; margin-left:20px; font-size:15px; font-weight:600;">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main style="max-width:560px; margin:0 auto; padding:40px 24px 56px;">

    <!-- PageIntro -->
    <div style="margin-bottom:24px;">
      <h1 style="margin:0 0 8px; font-size:28px; letter-spacing:-0.4px;">Get in touch</h1>
      <p style="margin:0; color:#616e7c; font-size:16px;">
        Questions about the demo? Send us a note and we&rsquo;ll reply.
      </p>
    </div>

    <!-- ContactCard -->
    <div style="background:#ffffff; border:1px solid #e4e7eb; border-radius:10px;
                padding:24px; box-shadow:0 1px 2px rgba(31,41,51,0.04);">
      <!-- ContactForm (static preview; no action/script) -->
      <form>

        <!-- Field: Name -->
        <div style="margin-bottom:16px;">
          <label for="name" style="display:block; font-size:14px; font-weight:600; margin-bottom:6px;">Name</label>
          <input id="name" name="name" type="text" placeholder="Ada Lovelace"
                 style="width:100%; box-sizing:border-box; padding:10px 12px; font-size:15px;
                        color:#1f2933; background:#ffffff; border:1px solid #cbd2d9;
                        border-radius:8px; outline:none;">
        </div>

        <!-- Field: Email -->
        <div style="margin-bottom:16px;">
          <label for="email" style="display:block; font-size:14px; font-weight:600; margin-bottom:6px;">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com"
                 style="width:100%; box-sizing:border-box; padding:10px 12px; font-size:15px;
                        color:#1f2933; background:#ffffff; border:1px solid #cbd2d9;
                        border-radius:8px; outline:none;">
          <!-- error slot (hidden in static mockup; see BRIEF.md success/error states)
          <p style="margin:6px 0 0; font-size:13px; color:#d64545;">Enter a valid email address</p>
          -->
        </div>

        <!-- Field: Message -->
        <div style="margin-bottom:20px;">
          <label for="message" style="display:block; font-size:14px; font-weight:600; margin-bottom:6px;">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="How can we help?"
                    style="width:100%; box-sizing:border-box; padding:10px 12px; font-size:15px;
                           color:#1f2933; background:#ffffff; border:1px solid #cbd2d9;
                           border-radius:8px; outline:none; resize:vertical; font-family:inherit;"></textarea>
        </div>

        <!-- FormActions -->
        <div style="text-align:right;">
          <button type="submit"
                  style="background:#4f46e5; color:#ffffff; border:none; cursor:pointer;
                         padding:11px 20px; font-size:15px; font-weight:600; border-radius:8px;">
            Send message
          </button>
        </div>

      </form>
    </div>
  </main>

  <!-- SiteFooter -->
  <footer style="border-top:1px solid #e4e7eb; background:#ffffff;">
    <div style="max-width:960px; margin:0 auto; padding:20px 24px;
                display:flex; align-items:center; justify-content:space-between;
                color:#616e7c; font-size:14px;">
      <span>&copy; 2026 DevAgent Demo</span>
      <a href="#" style="color:#616e7c; text-decoration:none;">GitHub</a>
    </div>
  </footer>

</body>
</html>
